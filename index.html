<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗チェックリスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d26;
    --surface2: #22263a;
    --accent: #f0a500;
    --accent2: #e05c2a;
    --text: #e8e8f0;
    --muted: #7a7d94;
    --check: #3ecf8e;
    --border: #2e3148;
    --radius: 10px;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--surface) 0%, #1e1430 100%);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .sync-indicator {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--check);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Ad Banner ── */
  .ad-banner {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
  }
  .ad-banner a {
    display: inline-block;
    background: linear-gradient(90deg, #bf0000, #e00);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 0.03em;
  }
  .ad-label { margin-bottom: 4px; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    overflow-x: auto;
  }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    white-space: nowrap;
    color: var(--muted);
  }
  .stat-chip span { color: var(--accent); font-weight: 700; }

  /* ── Section ── */
  .prefecture {
    margin: 12px 12px 0;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .pref-header {
    background: var(--surface2);
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .pref-header:hover { background: #252942; }
  .pref-label {
    font-size: 18px;
    font-weight: 900;
    color: var(--accent);
    min-width: 24px;
    text-align: center;
  }
  .pref-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
  }
  .pref-toggle { color: var(--muted); font-size: 10px; }

  /* ── Column Headers ── */
  .col-headers {
    display: grid;
    grid-template-columns: 1fr 44px 44px 44px;
    padding: 6px 16px;
    background: #131622;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    font-weight: 700;
    text-align: center;
  }
  .col-headers .store-col { text-align: left; }

  /* ── Store Row ── */
  .store-row {
    display: grid;
    grid-template-columns: 1fr 44px 44px 44px;
    align-items: center;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.15s;
  }
  .store-row:hover { background: #1e2235; }
  .store-name {
    font-size: 14px;
    font-weight: 500;
  }

  /* ── Checkbox ── */
  .check-cell {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .cb {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .cb:active { transform: scale(0.88); }
  .cb.checked-furuhon {
    background: rgba(240,165,0,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .cb.checked-tsutaya {
    background: rgba(224,92,42,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .cb.checked-other {
    background: rgba(62,207,142,0.15);
    border-color: var(--check);
    color: var(--check);
  }

  /* ── Add Store Form ── */
  .add-section {
    margin: 12px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .add-section h3 {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .add-form select, .add-form input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    -webkit-appearance: none;
  }
  .add-form select:focus, .add-form input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .add-btn {
    background: var(--accent);
    color: #000;
    font-weight: 800;
    border: none;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .add-btn:active { opacity: 0.75; }

  /* ── Supabase Setup Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 20px;
    width: 100%;
    max-width: 400px;
  }
  .modal h2 {
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .modal p { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .modal input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    width: 100%;
    margin-bottom: 10px;
    font-family: monospace;
  }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal-btn {
    background: var(--accent);
    color: #000;
    font-weight: 800;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
  }
  .modal-skip {
    display: block;
    text-align: center;
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--check);
    color: #000;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    transition: transform 0.3s;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Collapsed ── */
  .pref-body.collapsed { display: none; }

  /* ── Edit Mode Toggle ── */
  .edit-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .edit-toggle.active {
    background: rgba(224,92,42,0.15);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* ── Delete Button ── */
  .del-btn {
    display: none;
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid #c0392b;
    background: rgba(192,57,43,0.15);
    color: #e74c3c;
    font-size: 16px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .del-btn:active { transform: scale(0.88); background: rgba(192,57,43,0.4); }
  body.edit-mode .del-btn { display: flex; }
  body.edit-mode .store-row { grid-template-columns: 28px 1fr 44px 44px 44px; }
  body.edit-mode .col-headers { grid-template-columns: 28px 1fr 44px 44px 44px; }

  /* ── Footer ad ── */
  .footer-ad {
    margin: 16px 12px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
  .footer-ad a {
    display: inline-block;
    margin: 6px 4px 0;
    background: linear-gradient(90deg, #ff6a00, #ee0979);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 4px;
    text-decoration: none;
  }
</style>
</head>
<body>

<!-- Setup Modal -->
<div class="modal-overlay show" id="setupModal">
  <div class="modal">
    <h2>🔧 初回設定</h2>
    <p>全員でチェックを共有するには Supabase の URL と API キーが必要です。<br>
    <b>supabase.com</b> で無料プロジェクトを作成してください。</p>
    <input type="text" id="sbUrl" placeholder="https://xxxx.supabase.co" autocomplete="off">
    <input type="text" id="sbKey" placeholder="anon public key" autocomplete="off">
    <button class="modal-btn" onclick="saveSupabase()">保存して開始</button>
    <span class="modal-skip" onclick="skipSupabase()">ローカル保存で試す（共有なし）</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header>
  <div>
    <h1>📚 店舗チェックリスト</h1>
    <div class="header-sub">古本市場 / TSUTAYA / その他</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
    <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">✏️ 編集</button>
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot" style="background:var(--muted)"></div>
      <span id="syncStatus">未接続</span>
    </div>
  </div>
</header>

<!-- Ad Top -->
<div class="ad-banner">
  <div class="ad-label">📦 楽天ブックス</div>
  <!-- 楽天アフィリエイトバナーをここに貼る -->
  <a href="https://books.rakuten.co.jp/" target="_blank" id="rakutenAd">楽天ブックスで探す →</a>
</div>

<!-- Stats -->
<div class="stats-bar" id="statsBar">
  <div class="stat-chip">全店舗: <span id="statTotal">0</span></div>
  <div class="stat-chip">古本市場✓: <span id="statFuru">0</span></div>
  <div class="stat-chip">TSUTAYA✓: <span id="statTsut">0</span></div>
  <div class="stat-chip">その他✓: <span id="statOther">0</span></div>
</div>

<!-- Store List -->
<div id="storeList"></div>

<!-- Add Store -->
<div class="add-section">
  <h3>＋ 店舗を追加</h3>
  <div class="add-form">
    <select id="addPref">
      <option value="京都">京都</option>
      <option value="大阪" selected>大阪</option>
      <option value="兵庫">兵庫</option>
      <option value="奈良">奈良</option>
      <option value="その他">その他</option>
    </select>
    <input type="text" id="addName" placeholder="店舗名（例：梅田店）">
    <button class="add-btn" onclick="addStore()">追加する</button>
  </div>
</div>

<!-- Footer Ad -->
<div class="footer-ad">
  <div>📦 Amazonでも探す</div>
  <!-- AmazonアソシエイトバナーをここにIDを入れて貼る -->
  <a href="https://www.amazon.co.jp/s?k=%E5%8F%A4%E6%9C%AC&tag=YOUR_ASSOCIATE_TAG" target="_blank" id="amazonAd">Amazon 古本を探す →</a>
</div>

<script>
// ── データ定義 ──
const INITIAL_STORES = {
  京都: [
    "太秦店","桃山店","桂店","高野店","西陣店","イオン高の原店","四条河原町店"
  ],
  大阪: [
    "都島店","東豊中","大東店","北加賀屋店","庄内店","久宝寺店","菱江店",
    "高槻店","南茨木店","千里丘","イオン茨木","くずは","寝屋川","香里園",
    "門真店","鶴見店","生野店","東住吉","西淀川","東大阪","松原店","緑橋店",
    "箕面","長吉長原","羽曳野","富田林","中百舌鳥","深井店","泉大津",
    "日本橋","りんくう泉南店","原山台",
    "尼崎","伊丹店","イオン伊丹","川西店","宝塚店"
  ],
  兵庫: [
    "西宮店","魚住","灘店","三宮店","名谷","芦屋ベクトル","猪名寺",
    "野口","神戸北","三田店","大和郡山"
  ],
  奈良: [],
};

const TSUTAYA_STORES = {
  京都: [],
  大阪: ["寝屋川","阿倍野","枚方","八尾","姫路"],
  兵庫: [],
  奈良: [],
};

const OTHER_STORES = {
  京都: ["大垣書店伏見"],
  大阪: [],
  兵庫: [],
  奈良: [],
};

// ── State ──
let checks = {}; // { "大阪_太秦店_furuhon": true, ... }
let stores = JSON.parse(JSON.stringify(INITIAL_STORES));
let tsutayaStores = JSON.parse(JSON.stringify(TSUTAYA_STORES));
let otherStores = JSON.parse(JSON.stringify(OTHER_STORES));
let supabaseUrl = '';
let supabaseKey = '';
let useSupabase = false;
let collapsed = {};

// ── Supabase Setup ──
function saveSupabase() {
  supabaseUrl = document.getElementById('sbUrl').value.trim();
  supabaseKey = document.getElementById('sbKey').value.trim();
  if (!supabaseUrl || !supabaseKey) {
    alert('URLとキーを両方入力してください');
    return;
  }
  localStorage.setItem('sb_url', supabaseUrl);
  localStorage.setItem('sb_key', supabaseKey);
  useSupabase = true;
  document.getElementById('setupModal').classList.remove('show');
  initSupabase();
}

function skipSupabase() {
  useSupabase = false;
  document.getElementById('setupModal').classList.remove('show');
  document.getElementById('syncStatus').textContent = 'ローカル';
  loadLocal();
  render();
}

async function initSupabase() {
  document.getElementById('syncDot').style.background = 'var(--accent)';
  document.getElementById('syncStatus').textContent = '接続中...';
  try {
    await ensureTable();
    await loadFromSupabase();
    document.getElementById('syncDot').style.background = 'var(--check)';
    document.getElementById('syncStatus').textContent = 'リアルタイム同期';
    startPolling();
  } catch(e) {
    console.error(e);
    document.getElementById('syncDot').style.background = '#e05c2a';
    document.getElementById('syncStatus').textContent = 'エラー';
    showToast('Supabase接続失敗。ローカル保存に切り替え');
    useSupabase = false;
    loadLocal();
    render();
  }
}

async function ensureTable() {
  // テーブル存在確認（REST API経由）
  const res = await sbFetch('GET', '/rest/v1/checklist?limit=1');
  if (!res.ok && res.status === 404) throw new Error('テーブルなし');
}

async function sbFetch(method, path, body) {
  const opts = {
    method,
    headers: {
      'apikey': supabaseKey,
      'Authorization': 'Bearer ' + supabaseKey,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(supabaseUrl + path, opts);
}

async function loadFromSupabase() {
  const res = await sbFetch('GET', '/rest/v1/checklist?select=key,checked');
  const data = await res.json();
  checks = {};
  for (const row of data) {
    if (row.checked) checks[row.key] = true;
  }
  render();
}

async function saveToSupabase(key, checked) {
  await sbFetch('POST', '/rest/v1/checklist', [{ key, checked }]);
}

function startPolling() {
  setInterval(async () => {
    if (useSupabase) {
      await loadFromSupabase();
    }
  }, 5000);
}

// ── LocalStorage ──
function loadLocal() {
  const saved = localStorage.getItem('checklist_checks');
  if (saved) checks = JSON.parse(saved);
  const savedStores = localStorage.getItem('checklist_stores');
  if (savedStores) stores = JSON.parse(savedStores);
}

function saveLocal() {
  localStorage.setItem('checklist_checks', JSON.stringify(checks));
  localStorage.setItem('checklist_stores', JSON.stringify(stores));
}

// ── Toggle ──
async function toggle(key, type) {
  const isChecked = !checks[key];
  if (isChecked) checks[key] = true;
  else delete checks[key];

  if (useSupabase) {
    await saveToSupabase(key, isChecked);
  } else {
    saveLocal();
  }
  render();
  showToast(isChecked ? '✅ チェックしました' : '☐ 外しました');
}

// ── Edit Mode ──
let editMode = false;
function toggleEditMode() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('editToggle');
  btn.textContent = editMode ? '✅ 完了' : '✏️ 編集';
  btn.classList.toggle('active', editMode);
}

// ── Delete Store ──
async function deleteStore(pref, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;

  // 全リストから削除
  ['stores','tsutayaStores','otherStores'].forEach(listName => {
    const list = eval(listName);
    if (list[pref]) {
      const idx = list[pref].indexOf(name);
      if (idx !== -1) list[pref].splice(idx, 1);
    }
  });

  // チェックデータも削除
  ['furuhon','tsutaya','other'].forEach(type => {
    const key = `${pref}_${name}_${type}`;
    delete checks[key];
    if (useSupabase) saveToSupabase(key, false);
  });

  if (!useSupabase) saveLocal();
  render();
  showToast('🗑 ' + name + ' を削除しました');
}

// ── Add Store ──
function addStore() {
  const pref = document.getElementById('addPref').value;
  const name = document.getElementById('addName').value.trim();
  if (!name) return;
  if (!stores[pref]) stores[pref] = [];
  stores[pref].push(name);
  document.getElementById('addName').value = '';
  if (!useSupabase) saveLocal();
  render();
  showToast('✅ ' + pref + ' に追加しました');
}

// ── Render ──
function render() {
  const container = document.getElementById('storeList');
  container.innerHTML = '';

  let totalStores = 0, furuCount = 0, tsutCount = 0, otherCount = 0;

  const allPrefs = [...new Set([
    ...Object.keys(stores),
    ...Object.keys(tsutayaStores),
    ...Object.keys(otherStores)
  ])];

  for (const pref of allPrefs) {
    const furuList = stores[pref] || [];
    const tsutList = tsutayaStores[pref] || [];
    const otherList = otherStores[pref] || [];
    const allNames = [...new Set([...furuList, ...tsutList, ...otherList])];
    if (allNames.length === 0) continue;

    totalStores += allNames.length;

    const isCollapsed = collapsed[pref];
    const div = document.createElement('div');
    div.className = 'prefecture';

    // Count checks for this pref
    let pFuru = 0, pTsut = 0, pOther = 0;
    for (const name of allNames) {
      if (checks[`${pref}_${name}_furuhon`]) pFuru++;
      if (checks[`${pref}_${name}_tsutaya`]) pTsut++;
      if (checks[`${pref}_${name}_other`]) pOther++;
    }
    furuCount += pFuru;
    tsutCount += pTsut;
    otherCount += pOther;

    div.innerHTML = `
      <div class="pref-header" onclick="toggleCollapse('${pref}')">
        <span class="pref-label">${pref}</span>
        <span>${allNames.length}店舗</span>
        <span class="pref-count">${pFuru+pTsut+pOther}件チェック済み</span>
        <span class="pref-toggle">${isCollapsed ? '▶' : '▼'}</span>
      </div>
      <div class="pref-body ${isCollapsed ? 'collapsed' : ''}">
        <div class="col-headers">
          <span class="store-col" style="grid-column:1/3">店舗名</span>
          <span>古本<br>市場</span>
          <span>TSU<br>TAYA</span>
          <span>その<br>他</span>
        </div>
        ${allNames.map(name => {
          const fk = `${pref}_${name}_furuhon`;
          const tk = `${pref}_${name}_tsutaya`;
          const ok = `${pref}_${name}_other`;
          const fHas = furuList.includes(name);
          const tHas = tsutList.includes(name);
          const oHas = otherList.includes(name);
          const nameEsc = name.replace(/'/g, "\\'");
          return `
          <div class="store-row">
            <span class="del-btn" onclick="deleteStore('${pref}','${nameEsc}')">🗑</span>
            <span class="store-name">${name}</span>
            <span class="check-cell">
              ${fHas ? `<span class="cb ${checks[fk]?'checked-furuhon':''}" onclick="toggle('${fk}','furuhon')">${checks[fk]?'✓':''}</span>` : '<span style="color:var(--border)">—</span>'}
            </span>
            <span class="check-cell">
              ${tHas ? `<span class="cb ${checks[tk]?'checked-tsutaya':''}" onclick="toggle('${tk}','tsutaya')">${checks[tk]?'✓':''}</span>` : '<span style="color:var(--border)">—</span>'}
            </span>
            <span class="check-cell">
              ${oHas ? `<span class="cb ${checks[ok]?'checked-other':''}" onclick="toggle('${ok}','other')">${checks[ok]?'✓':''}</span>` : '<span style="color:var(--border)">—</span>'}
            </span>
          </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(div);
  }

  document.getElementById('statTotal').textContent = totalStores;
  document.getElementById('statFuru').textContent = furuCount;
  document.getElementById('statTsut').textContent = tsutCount;
  document.getElementById('statOther').textContent = otherCount;
}

function toggleCollapse(pref) {
  collapsed[pref] = !collapsed[pref];
  render();
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
